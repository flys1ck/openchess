name: Build

on:
  workflow_dispatch:
  pull_request:
    branches: main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        name: Install Bun

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - run: bun install

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev webkit2gtk-driver xvfb

      - uses: actions/cache@v5
        id: stockfish-cache
        with:
          path: |
            external/stockfish
          key: stockfish-${{ env.STOCKFISH_VERSION }}-ubuntu-latest
        env:
          STOCKFISH_VERSION: 18

      - name: Install Stockfish
        run: bun run scripts/downloadStockfish.ts
        if: steps.stockfish-cache.outputs.cache-hit != 'true'

      - name: Generate Target Triple
        run: |
          mkdir src-tauri/bin
          bun run scripts/generateTargetTriple.ts

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
